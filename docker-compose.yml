# Docker Compose для проекта «Битва Дашбордов» (Неделя 4).
# Два сервиса: PostgreSQL (БД) и backend (Spring Boot). Запуск: docker compose up -d

services:
  # Контейнер с СУБД. Данные сохраняются в volume postgres_data.
  postgres:
    image: postgres:15
    container_name: dashboard-battle-postgres
    environment:
      POSTGRES_DB: dashboard_battle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard_battle"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Контейнер с приложением. Собирается из backend/Dockerfile. Подключается к postgres по имени сервиса.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard-battle-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dashboard_battle
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
